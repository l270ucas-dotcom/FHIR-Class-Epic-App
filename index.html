<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Bridge | SMART on FHIR Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/fhirclient/build/fhir-client.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0ea5e9;
            --primary-dark: #0284c7;
            --accent: #6366f1;
            --bg: #0f172a;
            --glass: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: var(--text);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .background-blobs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            filter: blur(80px);
            border-radius: 50%;
            opacity: 0.4;
            animation: move 20s infinite alternate;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: var(--primary);
            top: -100px;
            right: -50px;
        }

        .blob-2 {
            width: 300px;
            height: 300px;
            background: var(--accent);
            bottom: -50px;
            left: -50px;
        }

        @keyframes move {
            from {
                transform: translate(0, 0);
            }

            to {
                transform: translate(50px, 50px);
            }
        }

        .portal-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .logo {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .tagline {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 40px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            font-size: 12px;
            color: #38bdf8;
            margin-bottom: 24px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #38bdf8;
            border-radius: 50%;
            box-shadow: 0 0 10px #38bdf8;
        }

        .btn {
            padding: 16px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            margin-bottom: 12px;
        }

        .btn-epic {
            background: linear-gradient(to bottom right, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
        }

        .btn-epic:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(14, 165, 233, 0.4);
        }

        .btn-smart {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid var(--border);
        }

        .btn-smart:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .alert-box {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.2);
            padding: 12px;
            border-radius: 12px;
            font-size: 12px;
            color: #fbbf24;
            margin-top: 24px;
            display: none;
            text-align: left;
            line-height: 1.5;
        }

        .footer-tools {
            margin-top: 40px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #64748b;
        }

        .tool-link {
            cursor: pointer;
            transition: color 0.2s;
        }

        .tool-link:hover {
            color: var(--primary);
        }
    </style>
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="portal-card">
        <div class="logo">Health Bridge</div>
        <div class="tagline">Enterprise FHIR Patient Exchange</div>

        <div class="status-badge">
            <div class="status-dot"></div>
            Epic Interconnect R4 Online
        </div>

        <button class="btn btn-epic" id="launch-epic">Launch Epic Patient Portal</button>
        <button class="btn btn-smart" id="launch-smart">Legacy SMART Health IT</button>

        <div id="alert" class="alert-box"></div>

        <div class="footer-tools">
            <span class="tool-link" onclick="sessionStorage.clear(); localStorage.clear(); location.reload();">Clear All
                Session Data</span>
            <span class="tool-link" onclick="showDebug()">View Protocol Config</span>
        </div>
    </div>

    <script>
        /*
         * CRITICAL FIX based on Epic's official documentation:
         *
         * 1. The `aud` parameter is REQUIRED since May 2023.
         *    Without it, Epic returns the token but omits the `patient` field.
         *    The value must be the FHIR base URL (same as `iss`).
         *
         * 2. Scopes must match what's registered in the portal.
         *    Epic's own example uses "Patient.read" (capital P).
         *    We request "openid fhirUser" for identity.
         *
         * 3. PKCE is recommended for all apps.
         */
        const epicIss = "https://fhir.epic.com/interconnect-fhir-oauth/api/FHIR/R4";
        const clientId = "59484de8-a5a3-4123-bb74-2c931c4c8a0f";
        const redirectUri = "https://l270ucas-dotcom.github.io/FHIR-Class-Epic-App/app.html";

        document.getElementById('launch-epic').addEventListener('click', () => {
            document.getElementById('alert').style.display = 'block';
            document.getElementById('alert').innerText = "Redirecting to Epic MyChart login...";

            FHIR.oauth2.authorize({
                client_id: clientId,
                redirect_uri: redirectUri,
                scope: "openid fhirUser patient/Patient.read patient/MedicationRequest.read patient/Observation.read",
                iss: epicIss,
                pkce: true,

                // THIS IS THE KEY FIX: Epic requires `aud` since May 2023.
                // Without it, the `patient` field is missing from the token response.
                clientType: "public",
                aud: epicIss
            });
        });

        document.getElementById('launch-smart').addEventListener('click', () => {
            FHIR.oauth2.authorize({
                client_id: "my_web_app",
                redirect_uri: redirectUri,
                scope: "openid fhirUser patient/Patient.read patient/MedicationRequest.read patient/Observation.read launch/patient",
                iss: "https://launch.smarthealthit.org/v/r4/fhir",
                pkce: true
            });
        });

        function showDebug() {
            const a = document.getElementById('alert');
            a.style.display = 'block';
            a.innerHTML = `<strong>Protocol Config:</strong><br>
                Client ID: ${clientId.substring(0, 8)}…<br>
                Redirect: ${redirectUri}<br>
                ISS/AUD: ${epicIss}<br>
                Scopes: openid fhirUser patient/Patient.read<br>
                PKCE: Enabled<br>
                <strong>aud: ${epicIss}</strong> (REQUIRED since May 2023)`;
        }
    </script>
</body>

</html>
